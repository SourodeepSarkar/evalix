<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

<title>
    Mock Test Evaluator
</title>

<link
    rel="stylesheet"
    href="styles.css" />

</head>

<body>

<div class="floating-timer hidden" id="floatingTimer">

    <div class="timer-main">

        <span id="timerText">
            00:00
        </span>

    </div>

    <div class="timer-controls">

        <button id="pauseTimerBtn">
            Pause
        </button>

    </div>

</div>

<div class="container">

    <header class="hero">

        <div>

            <h1>
                Mock Test Evaluator
            </h1>

            <p>
                PDF + MCQ workspace with auto evaluation
            </p>

        </div>

    </header>

    <section
        class="panel"
        id="setupPanel">

        <h2>
            Setup Test
        </h2>

        <div class="format-box">

            <span class="format-title">
                Required Answer Key Format
            </span>

<pre>
Q1 (C)
Q2 (B)
Q3 (A)
</pre>

        </div>

        <div class="pdf-upload">

            <label>
                Upload Question PDF
            </label>

            <input
                type="file"
                id="pdfInput"
                accept="application/pdf" />

        </div>

        <textarea
            id="answerKey"
            placeholder="Paste answer key here..."></textarea>

        <div class="settings">

            <div class="setting-card">

                <label>
                    Correct Marks
                </label>

                <input
                    type="number"
                    id="correctMarks"
                    value="4" />

            </div>

            <div class="setting-card">

                <label>
                    Wrong Marks
                </label>

                <input
                    type="number"
                    id="wrongMarks"
                    value="-1" />

            </div>

            <div class="setting-card">

                <label>
                    Unattempted Marks
                </label>

                <input
                    type="number"
                    id="skipMarks"
                    value="0" />

            </div>

            <div class="setting-card">

                <label>
                    Timer (Minutes)
                </label>

                <input
                    type="number"
                    id="timerMinutes"
                    value="60" />

            </div>

        </div>

        <button id="generateBtn">
            Start Test
        </button>

    </section>

    <section
        id="workspace"
        class="workspace hidden">

        <div class="pdf-panel">

            <div class="panel-header">

                <h2>
                    Question Paper
                </h2>

            </div>

            <iframe
                id="pdfViewer">
            </iframe>

        </div>

        <div class="mcq-panel">

            <div class="questions-header">

                <div>

                    <h2>
                        Questions
                    </h2>

                    <div class="stats-bar">

                        Attempted:
                        <span id="attemptedCount">
                            0
                        </span>

                        /

                        <span id="totalCount">
                            0
                        </span>

                    </div>

                </div>

                <div class="question-actions">

                    <button id="submitBtn">
                        Submit
                    </button>

                    <button
                        id="resetBtn"
                        class="secondary">

                        Reset

                    </button>

                </div>

            </div>

            <div id="questionsContainer"></div>

        </div>

    </section>

    <section
        id="resultPanel"
        class="result-panel hidden">

        <h2>
            Results
        </h2>

        <div class="result-grid">

            <div class="result-card">

                <span class="label">
                    Score
                </span>

                <span
                    class="value"
                    id="scoreValue">

                    0

                </span>

            </div>

            <div class="result-card">

                <span class="label">
                    Correct
                </span>

                <span
                    class="value"
                    id="correctValue">

                    0

                </span>

            </div>

            <div class="result-card">

                <span class="label">
                    Wrong
                </span>

                <span
                    class="value"
                    id="wrongValue">

                    0

                </span>

            </div>

            <div class="result-card">

                <span class="label">
                    Skipped
                </span>

                <span
                    class="value"
                    id="skipValue">

                    0

                </span>

            </div>

            <div class="result-card">

                <span class="label">
                    Accuracy
                </span>

                <span
                    class="value"
                    id="accuracyValue">

                    0%

                </span>

            </div>

        </div>

    </section>

</div>

<script>

const generateBtn =
    document.getElementById("generateBtn");

const submitBtn =
    document.getElementById("submitBtn");

const resetBtn =
    document.getElementById("resetBtn");

const pauseTimerBtn =
    document.getElementById("pauseTimerBtn");

const pdfInput =
    document.getElementById("pdfInput");

const pdfViewer =
    document.getElementById("pdfViewer");

const workspace =
    document.getElementById("workspace");

const setupPanel =
    document.getElementById("setupPanel");

const floatingTimer =
    document.getElementById("floatingTimer");

let answerMap = {};
let userAnswers = {};

let timerInterval;
let remainingSeconds = 0;

let submitted = false;
let timerPaused = false;

pdfInput.addEventListener(
    "change",
    e => {

    const file =
        e.target.files[0];

    if (!file) return;

    const url =
        URL.createObjectURL(file);

    pdfViewer.src = url;
});

generateBtn.addEventListener(
    "click",
    () => {

    const raw =
        document
        .getElementById("answerKey")
        .value;

    const regex =
        /Q\s*(\d+)\s*\(?([A-D])\)?/gi;

    answerMap = {};

    let match;

    while (
        (match = regex.exec(raw)) !== null
    ) {

        answerMap[
            parseInt(match[1])
        ] = match[2].toUpperCase();
    }

    if (
        Object.keys(answerMap).length === 0
    ) {

        alert(
            "Invalid answer key."
        );

        return;
    }

    generateQuestions();

    setupPanel.classList.add(
        "hidden"
    );

    workspace.classList.remove(
        "hidden"
    );

    floatingTimer.classList.remove(
        "hidden"
    );

    startTimer();
});

function generateQuestions() {

    const container =
        document.getElementById(
            "questionsContainer"
        );

    container.innerHTML = "";

    userAnswers = {};

    const sortedQuestions =
        Object.keys(answerMap)
        .map(Number)
        .sort((a,b)=>a-b);

    document.getElementById(
        "totalCount"
    ).textContent =
        sortedQuestions.length;

    sortedQuestions.forEach(qNo => {

        const card =
            document.createElement("div");

        card.className =
            "question-card";

        card.dataset.question =
            qNo;

        card.innerHTML = `
            <h3>Q${qNo}</h3>

            <div class="options">

                <button class="option-btn">A</button>
                <button class="option-btn">B</button>
                <button class="option-btn">C</button>
                <button class="option-btn">D</button>

            </div>
        `;

        const buttons =
            card.querySelectorAll(
                ".option-btn"
            );

        buttons.forEach(btn => {

            btn.addEventListener(
                "click",
                () => {

                if (submitted) return;

                const current =
                    userAnswers[qNo];

                if (
                    current ===
                    btn.textContent
                ) {

                    delete userAnswers[qNo];

                    btn.classList.remove(
                        "selected"
                    );

                    updateStats();

                    return;
                }

                userAnswers[qNo] =
                    btn.textContent;

                buttons.forEach(b =>
                    b.classList.remove(
                        "selected"
                    )
                );

                btn.classList.add(
                    "selected"
                );

                updateStats();
            });
        });

        container.appendChild(card);
    });
}

function updateStats() {

    document.getElementById(
        "attemptedCount"
    ).textContent =
        Object.keys(userAnswers).length;
}

function startTimer() {

    const mins =
        parseInt(
            document.getElementById(
                "timerMinutes"
            ).value
        );

    remainingSeconds =
        mins * 60;

    updateTimerDisplay();

    clearInterval(timerInterval);

    timerInterval =
        setInterval(() => {

        if (timerPaused) return;

        remainingSeconds--;

        updateTimerDisplay();

        if (
            remainingSeconds <= 0
        ) {

            clearInterval(
                timerInterval
            );

            alert(
                "Time ended. Auto submitting."
            );

            submitTest();
        }

    },1000);
}

pauseTimerBtn.addEventListener(
    "click",
    () => {

    timerPaused =
        !timerPaused;

    pauseTimerBtn.textContent =
        timerPaused
        ? "Resume"
        : "Pause";
});

function updateTimerDisplay() {

    const mins =
        Math.floor(
            remainingSeconds / 60
        );

    const secs =
        remainingSeconds % 60;

    document.getElementById(
        "timerText"
    ).textContent =
        `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
}

submitBtn.addEventListener(
    "click",
    submitTest
);

function submitTest() {

    if (submitted) return;

    submitted = true;

    clearInterval(timerInterval);

    const correctMarks =
        parseFloat(
            document.getElementById(
                "correctMarks"
            ).value
        );

    const wrongMarks =
        parseFloat(
            document.getElementById(
                "wrongMarks"
            ).value
        );

    const skipMarks =
        parseFloat(
            document.getElementById(
                "skipMarks"
            ).value
        );

    let score = 0;

    let correct = 0;
    let wrong = 0;
    let skipped = 0;

    Object.keys(answerMap)
    .forEach(q => {

        const correctAnswer =
            answerMap[q];

        const userAnswer =
            userAnswers[q];

        const card =
            document.querySelector(
                `[data-question="${q}"]`
            );

        if (!userAnswer) {

            skipped++;

            score += skipMarks;

        }

        else if (
            userAnswer ===
            correctAnswer
        ) {

            correct++;

            score += correctMarks;

        }

        else {

            wrong++;

            score += wrongMarks;

            card.classList.add(
                "wrong-glow"
            );
        }
    });

    const attempted =
        correct + wrong;

    const accuracy =
        attempted === 0
        ? 0
        : (
            (
                correct /
                attempted
            ) * 100
        ).toFixed(2);

    document.getElementById(
        "scoreValue"
    ).textContent = score;

    document.getElementById(
        "correctValue"
    ).textContent = correct;

    document.getElementById(
        "wrongValue"
    ).textContent = wrong;

    document.getElementById(
        "skipValue"
    ).textContent = skipped;

    document.getElementById(
        "accuracyValue"
    ).textContent =
        `${accuracy}%`;

    highlightAnswers();

    document.getElementById(
        "resultPanel"
    ).classList.remove(
        "hidden"
    );
}

function highlightAnswers() {

    const cards =
        document.querySelectorAll(
            ".question-card"
        );

    cards.forEach(card => {

        const qNo =
            card.dataset.question;

        const correctAnswer =
            answerMap[qNo];

        const buttons =
            card.querySelectorAll(
                ".option-btn"
            );

        buttons.forEach(btn => {

            const val =
                btn.textContent;

            btn.disabled = true;

            if (
                val ===
                correctAnswer
            ) {
                btn.classList.add(
                    "correct"
                );
            }

            if (
                val ===
                userAnswers[qNo]
                &&
                val !==
                correctAnswer
            ) {
                btn.classList.add(
                    "wrong"
                );
            }
        });
    });
}

resetBtn.addEventListener(
    "click",
    () => {

    location.reload();
});

</script>

</body>
</html>
